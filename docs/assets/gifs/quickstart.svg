<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500" role="img" aria-label="NeuralForge-X quickstart terminal session">
  <defs>
    <linearGradient id="term" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1326"/><stop offset="1" stop-color="#0a1020"/>
    </linearGradient>
    <style>.m{font-family:'JetBrains Mono','SF Mono',Consolas,monospace;font-size:16px}</style>
    <clipPath id="c1"><rect x="28" y="72" width="0" height="24"><animate attributeName="width" values="0;232" dur="0.6s" begin="0.3s" fill="freeze"/></rect></clipPath>
    <clipPath id="c4"><rect x="28" y="222" width="0" height="24"><animate attributeName="width" values="0;110" dur="0.4s" begin="2.3s" fill="freeze"/></rect></clipPath>
    <clipPath id="c7"><rect x="28" y="342" width="0" height="24"><animate attributeName="width" values="0;560" dur="0.9s" begin="4.0s" fill="freeze"/></rect></clipPath>
  </defs>

  <rect width="880" height="500" rx="14" fill="url(#term)" stroke="#22304d" stroke-width="1.5"/>
  <!-- title bar -->
  <rect width="880" height="44" rx="14" fill="#111a30"/>
  <rect y="30" width="880" height="14" fill="#111a30"/>
  <circle cx="26" cy="22" r="7" fill="#ff5f56"/><circle cx="50" cy="22" r="7" fill="#ffbd2e"/><circle cx="74" cy="22" r="7" fill="#27c93f"/>
  <text x="440" y="27" text-anchor="middle" class="m" fill="#7f8fb0" font-size="13">neuralforge — python</text>

  <g class="m">
    <!-- 1: typed command -->
    <g clip-path="url(#c1)"><text x="28" y="90" fill="#e6edf3"><tspan fill="#34d399">$ </tspan>pip install -e ".[dev]"</text></g>
    <!-- 2: compile (fade) -->
    <text x="28" y="120" fill="#7f8fb0" opacity="0">  Compiling neuralforge_core (Rust · AVX2 + FMA) …<animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.0s" fill="freeze"/></text>
    <!-- 3: success -->
    <text x="28" y="150" fill="#7ee7c0" opacity="0">  ✓ built neuralforge._native  ·  abi3 wheel (py39+)<animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.7s" fill="freeze"/></text>

    <!-- 4: python (typed) -->
    <g clip-path="url(#c4)"><text x="28" y="240" fill="#e6edf3"><tspan fill="#34d399">$ </tspan>python</text></g>
    <!-- 5 -->
    <text x="28" y="270" fill="#cdd9ec" opacity="0"><tspan fill="#6c7a96">&gt;&gt;&gt; </tspan>import neuralforge as nf, numpy as np<animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.9s" fill="freeze"/></text>
    <!-- 6 -->
    <text x="28" y="300" fill="#cdd9ec" opacity="0"><tspan fill="#6c7a96">&gt;&gt;&gt; </tspan>corpus = np.random.rand(100_000, 768).astype("float32")<animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.4s" fill="freeze"/></text>
    <!-- 7: the search (typed) -->
    <g clip-path="url(#c7)"><text x="28" y="360" fill="#cdd9ec"><tspan fill="#6c7a96">&gt;&gt;&gt; </tspan>nf.top_k_search(q, corpus, k=5, metric="cosine")</text></g>

    <!-- result highlight box -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="5.0s" fill="freeze"/>
      <rect x="20" y="378" width="840" height="40" rx="8" fill="#0e2a22" stroke="#1f6b53"/>
      <text x="32" y="404" class="m" fill="#7ee7c0">SearchResult(k=5, top=[(<tspan fill="#9fdcff">8123</tspan>, 0.94), (<tspan fill="#9fdcff">91</tspan>, 0.92), (<tspan fill="#9fdcff">4570</tspan>, 0.90), …])</text>
    </g>
    <!-- timing line -->
    <text x="28" y="448" fill="#6c9f8c" opacity="0">  ⏱ 3.4 ms · 29M vectors/s · O(k·threads) memory · GIL released<animate attributeName="opacity" values="0;1" dur="0.4s" begin="5.5s" fill="freeze"/></text>

    <!-- blinking caret -->
    <rect x="28" y="466" width="10" height="20" fill="#34d399" opacity="0">
      <animate attributeName="opacity" values="0;0" dur="6s" begin="0s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0;1" dur="1s" begin="6s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
