<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" width="960" height="300" role="img" aria-label="GPU pipeline: host to device transfer, SM grid compute, device to host, with arithmetic-intensity routing">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0b1020"/><stop offset="1" stop-color="#0e1830"/></linearGradient>
    <style>.t{font-family:'Segoe UI',system-ui,sans-serif;fill:#e6edf3}.m{font-family:'JetBrains Mono',Consolas,monospace}.lbl{font-family:'Segoe UI',system-ui,sans-serif;fill:#6c7a96;font-size:12px}</style>
  </defs>
  <rect width="960" height="300" rx="14" fill="url(#bg)" stroke="#22304d" stroke-width="1.5"/>
  <text x="24" y="32" class="t" font-size="16" font-weight="700">GPU pipeline <tspan class="m" font-size="12" fill="#6c7a96">— host ⇄ device, sm_120 kernels, intensity-aware routing</tspan></text>

  <!-- Host -->
  <rect x="24" y="74" width="150" height="120" rx="10" fill="#101a30" stroke="#38bdf8"/>
  <text x="99" y="100" text-anchor="middle" class="t" font-size="14" font-weight="700">Host RAM</text>
  <g fill="#1b3350"><rect x="42" y="116" width="114" height="12" rx="3"/><rect x="42" y="134" width="114" height="12" rx="3"/><rect x="42" y="152" width="114" height="12" rx="3"/><rect x="42" y="170" width="114" height="12" rx="3"/></g>
  <text x="99" y="210" text-anchor="middle" class="lbl">corpus N×d</text>

  <!-- H2D bus -->
  <text x="232" y="96" text-anchor="middle" class="lbl">H2D · PCIe</text>
  <line x1="174" y1="134" x2="290" y2="134" stroke="#2a3a59" stroke-width="2"/>
  <g fill="#38bdf8"><rect x="174" y="129" width="12" height="10" rx="2"><animate attributeName="x" values="174;278" dur="1.1s" repeatCount="indefinite"/></rect><rect x="174" y="129" width="12" height="10" rx="2"><animate attributeName="x" values="174;278" dur="1.1s" begin="0.45s" repeatCount="indefinite"/></rect></g>

  <!-- GPU SM grid -->
  <rect x="300" y="62" width="330" height="160" rx="10" fill="#0d1526" stroke="#76B900"/>
  <text x="465" y="84" text-anchor="middle" class="t" font-size="14" font-weight="700" fill="#c2e889">RTX 5090 · sm_120</text>
  <g fill="#76B900">
    <!-- 8 cols x 4 rows of SM cells, lighting in a diagonal wave -->
    <g id="smrow">
      <rect x="318" y="98"  width="30" height="22" rx="3" opacity="0.18"><animate attributeName="opacity" values="0.18;1;0.18" dur="1.6s" begin="0.0s" repeatCount="indefinite"/></rect>
      <rect x="356" y="98"  width="30" height="22" rx="3" opacity="0.18"><animate attributeName="opacity" values="0.18;1;0.18" dur="1.6s" begin="0.12s" repeatCount="indefinite"/></rect>
      <rect x="394" y="98"  width="30" height="22" rx="3" opacity="0.18"><animate attributeName="opacity" values="0.18;1;0.18" dur="1.6s" begin="0.24s" repeatCount="indefinite"/></rect>
      <rect x="432" y="98"  width="30" height="22" rx="3" opacity="0.18"><animate attributeName="opacity" values="0.18;1;0.18" dur="1.6s" begin="0.36s" repeatCount="indefinite"/></rect>
      <rect x="470" y="98"  width="30" height="22" rx="3" opacity="0.18"><animate attributeName="opacity" values="0.18;1;0.18" dur="1.6s" begin="0.48s" repeatCount="indefinite"/></rect>
      <rect x="508" y="98"  width="30" height="22" rx="3" opacity="0.18"><animate attributeName="opacity" values="0.18;1;0.18" dur="1.6s" begin="0.60s" repeatCount="indefinite"/></rect>
      <rect x="546" y="98"  width="30" height="22" rx="3" opacity="0.18"><animate attributeName="opacity" values="0.18;1;0.18" dur="1.6s" begin="0.72s" repeatCount="indefinite"/></rect>
      <rect x="584" y="98"  width="30" height="22" rx="3" opacity="0.18"><animate attributeName="opacity" values="0.18;1;0.18" dur="1.6s" begin="0.84s" repeatCount="indefinite"/></rect>
    </g>
    <g>
      <rect x="318" y="126" width="30" height="22" rx="3" opacity="0.18"><animate attributeName="opacity" values="0.18;1;0.18" dur="1.6s" begin="0.12s" repeatCount="indefinite"/></rect>
      <rect x="356" y="126" width="30" height="22" rx="3" opacity="0.18"><animate attributeName="opacity" values="0.18;1;0.18" dur="1.6s" begin="0.24s" repeatCount="indefinite"/></rect>
      <rect x="394" y="126" width="30" height="22" rx="3" opacity="0.18"><animate attributeName="opacity" values="0.18;1;0.18" dur="1.6s" begin="0.36s" repeatCount="indefinite"/></rect>
      <rect x="432" y="126" width="30" height="22" rx="3" opacity="0.18"><animate attributeName="opacity" values="0.18;1;0.18" dur="1.6s" begin="0.48s" repeatCount="indefinite"/></rect>
      <rect x="470" y="126" width="30" height="22" rx="3" opacity="0.18"><animate attributeName="opacity" values="0.18;1;0.18" dur="1.6s" begin="0.60s" repeatCount="indefinite"/></rect>
      <rect x="508" y="126" width="30" height="22" rx="3" opacity="0.18"><animate attributeName="opacity" values="0.18;1;0.18" dur="1.6s" begin="0.72s" repeatCount="indefinite"/></rect>
      <rect x="546" y="126" width="30" height="22" rx="3" opacity="0.18"><animate attributeName="opacity" values="0.18;1;0.18" dur="1.6s" begin="0.84s" repeatCount="indefinite"/></rect>
      <rect x="584" y="126" width="30" height="22" rx="3" opacity="0.18"><animate attributeName="opacity" values="0.18;1;0.18" dur="1.6s" begin="0.96s" repeatCount="indefinite"/></rect>
    </g>
    <g>
      <rect x="318" y="154" width="30" height="22" rx="3" opacity="0.18"><animate attributeName="opacity" values="0.18;1;0.18" dur="1.6s" begin="0.24s" repeatCount="indefinite"/></rect>
      <rect x="356" y="154" width="30" height="22" rx="3" opacity="0.18"><animate attributeName="opacity" values="0.18;1;0.18" dur="1.6s" begin="0.36s" repeatCount="indefinite"/></rect>
      <rect x="394" y="154" width="30" height="22" rx="3" opacity="0.18"><animate attributeName="opacity" values="0.18;1;0.18" dur="1.6s" begin="0.48s" repeatCount="indefinite"/></rect>
      <rect x="432" y="154" width="30" height="22" rx="3" opacity="0.18"><animate attributeName="opacity" values="0.18;1;0.18" dur="1.6s" begin="0.60s" repeatCount="indefinite"/></rect>
      <rect x="470" y="154" width="30" height="22" rx="3" opacity="0.18"><animate attributeName="opacity" values="0.18;1;0.18" dur="1.6s" begin="0.72s" repeatCount="indefinite"/></rect>
      <rect x="508" y="154" width="30" height="22" rx="3" opacity="0.18"><animate attributeName="opacity" values="0.18;1;0.18" dur="1.6s" begin="0.84s" repeatCount="indefinite"/></rect>
      <rect x="546" y="154" width="30" height="22" rx="3" opacity="0.18"><animate attributeName="opacity" values="0.18;1;0.18" dur="1.6s" begin="0.96s" repeatCount="indefinite"/></rect>
      <rect x="584" y="154" width="30" height="22" rx="3" opacity="0.18"><animate attributeName="opacity" values="0.18;1;0.18" dur="1.6s" begin="1.08s" repeatCount="indefinite"/></rect>
    </g>
  </g>
  <text x="465" y="208" text-anchor="middle" class="lbl">CUDA C++ · Triton · PyTorch (fp32)</text>

  <!-- D2H bus -->
  <text x="700" y="96" text-anchor="middle" class="lbl">D2H</text>
  <line x1="630" y1="134" x2="746" y2="134" stroke="#2a3a59" stroke-width="2"/>
  <g fill="#34d399"><rect x="630" y="129" width="12" height="10" rx="2"><animate attributeName="x" values="630;734" dur="1.1s" begin="0.3s" repeatCount="indefinite"/></rect></g>

  <!-- results -->
  <rect x="756" y="74" width="178" height="120" rx="10" fill="#101a30" stroke="#34d399"/>
  <text x="845" y="100" text-anchor="middle" class="t" font-size="14" font-weight="700">results</text>
  <text x="845" y="128" text-anchor="middle" class="m" font-size="12" fill="#7ee7c0">similarity matrix</text>
  <text x="845" y="150" text-anchor="middle" class="m" font-size="12" fill="#7ee7c0">/ top-k</text>
  <text x="845" y="178" text-anchor="middle" class="lbl">host array out</text>

  <!-- arithmetic intensity badges -->
  <g font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" font-weight="600">
    <rect x="24" y="250" width="430" height="32" rx="8" fill="#10231c" stroke="#34d399"/>
    <text x="40" y="271" fill="#7ee7c0">batch  ·  compute-bound  ·  q·n·d work  →  GPU wins 2.4–7.4×</text>
    <rect x="470" y="250" width="464" height="32" rx="8" fill="#241016" stroke="#fb7185"/>
    <text x="486" y="271" fill="#ffb3bf">single-query top-k  ·  transfer-bound  ·  ships 600 MB  →  CPU wins</text>
  </g>
</svg>
