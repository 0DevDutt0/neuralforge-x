# Loads dashboards from disk so they appear without manual import.
apiVersion: 1

providers:
  - name: NeuralForge-X
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
